android {
    // ... الإعدادات السابقة كما هي ...

    packaging {
        resources {
            // تجاهل كل ملفات META-INF
            excludes += 'META-INF/**'
            
            // تجاهل ملفات البروجارد المكررة
            excludes += 'proguard.txt'
            
            // حل مشكلة classes.jar المكرر (هذا هو السطر الجديد)
            excludes += 'classes.jar'
            
            // دمج ملفات الرخصة
            merges += 'META-INF/LICENSE*'
        }
    }
}
