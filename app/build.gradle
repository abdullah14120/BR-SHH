plugins {
    id 'com.android.application'
}

android {
    namespace 'com.backup.restore.sh'
    compileSdk 35

    defaultConfig {
        applicationId "com.backup.restore.sh"
        minSdk 26
        targetSdk 35
        versionCode 1
        versionName "1.0"
    }

    buildFeatures {
        aidl true 
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    
    // تم حذف بلوك packaging بالكامل بناءً على طلبك
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.7.0'
    implementation 'com.google.android.material:material:1.12.0'
    
    // 1. المكتبة الأولى: تحميل تلقائي (Online)
    implementation 'dev.rikka.shizuku:api:13.1.5'
    
    // 2. المكتبة الثانية: تحميل محلي (من مجلد libs)
    // تأكد من وجود ملف provider-13.1.5.aar.jar فقط في مجلد libs
    implementation files('libs/provider-13.1.5.aar.jar')
}
