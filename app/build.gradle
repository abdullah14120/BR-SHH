plugins {
    id 'com.android.application'
}

android {
    namespace 'com.backup.restore.sh'
    compileSdk 35

    defaultConfig {
        applicationId "com.backup.restore.sh"
        minSdk 26
        targetSdk 35
        versionCode 1
        versionName "1.0"
    }

    buildFeatures {
        // تفعيل AIDL ضروري جداً لعمل Shizuku
        aidl true 
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    packaging {
        resources {
            // استبعاد الملفات الوصفية التي تسبب تصادم عند استخدام aar.jar يدوياً
            excludes += 'META-INF/**'
            excludes += '**/AndroidManifest.xml'
            excludes += '**/R.txt'
            excludes += '**/proguard.txt'
            excludes += '**/aar-metadata.properties'
            
            // دمج ملفات التراخيص
            merges += 'META-INF/LICENSE*'
        }
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.7.0'
    implementation 'com.google.android.material:material:1.12.0'
    
    // ربط ملفات المكتبة بالأسماء التي تظهر في مستودعك (libs) حالياً
    implementation files('libs/api-13.1.5.aar.jar')
    implementation files('libs/provider-13.1.5.aar.jar')
}
