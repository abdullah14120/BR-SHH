plugins {
    id 'com.android.application'
}

android {
    namespace 'com.backup.restore.sh'
    compileSdk 35

    defaultConfig {
        applicationId "com.backup.restore.sh"
        minSdk 26
        targetSdk 35
        versionCode 1
        versionName "1.0"
    }

    buildFeatures {
        aidl true 
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    packaging {
        resources {
            // استبعاد ملفات الوصف فقط لعدم التصادم
            excludes += 'META-INF/**'
            excludes += '**/AndroidManifest.xml'
            excludes += '**/R.txt'
            excludes += '**/proguard.txt'
            excludes += '**/aar-metadata.properties'
            
            // ملاحظة: لم نضع classes.jar هنا لكي لا يختفي الكود
            merges += 'META-INF/LICENSE*'
        }
    }
}

// إضافة هذا البلوك لتعريف مجلد libs كمستودع محلي
repositories {
    flatDir {
        dirs 'libs'
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.7.0'
    implementation 'com.google.android.material:material:1.12.0'
    
    // الربط المباشر مع الملفات المرفوعة يدوياً بأسماءها الحالية
    implementation files('libs/api-13.1.5.aar.jar')
    implementation files('libs/provider-13.1.5.aar.jar')
}
