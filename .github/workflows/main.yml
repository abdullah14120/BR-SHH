name: BR-SH Build (Master Mode)

on:
  push:
    branches: [ "main" ] # تأكد أن اسم الفرع في مستودعك الجديد هو main
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # يتيح لك زر "تشغيل يدوياً" في تبويب Actions

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # استخدام Gradle 8.13 مباشرة كما في مشروع Pixel VoLTE
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 8.13

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # تشغيل البناء باستخدام الـ Wrapper الذي سيتم ضبطه تلقائياً
    - name: Build with Gradle
      run: ./gradlew assembleDebug

    # استخراج ملف الـ APK ورفعه لتتمكن من تحميله
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: BR-SH-New-Build
        path: app/build/outputs/apk/debug/app-debug.apk
