    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.13 # نستخدم نفس إصدار Pixel Patch

    - name: Build with Gradle
      run: gradle assembleDebug
